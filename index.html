<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSE CAff by onkiponkizuzuzu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;400;600&family=Merriweather:wght@100;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        :root { 
            --bg: #f8fafc; --text: #0f172a; --border: #e2e8f0; --sidebar: #ffffff; 
            color-scheme: light; 
        }
        .dark { 
            --bg: #0f172a; --text: #f1f5f9; --border: #334155; --sidebar: #1e293b; 
            color-scheme: dark; 
        }
        body { font-family: 'Inter', sans-serif; transition: all 0.3s; margin: 0; min-height: 100vh; }
        .serif-title { font-family: 'Merriweather', serif; }
        
        /* Space Optimization: Reduced margins and padding */
        .article-card { scroll-margin-top: 80px; border-bottom: 1px solid var(--border); padding-bottom: 1rem; margin-bottom: 1.5rem; width: 100%; }
        #sidebar { transition: all 0.3s ease; width: 280px; position: sticky; top: 60px; height: calc(100vh - 60px); overflow-y: auto; z-index: 30; }
        #sidebar.collapsed { width: 0; padding: 0; overflow: hidden; border: none; }
        
        /* Space Optimization: Reduced title text size and line-height */
        .article-title { font-size: 1.15rem; line-height: 1.5rem; font-weight: 600; cursor: pointer; transition: color 0.2s; }
        .article-title:hover { color: #3b82f6; }
        
        .content-body { font-family: 'Merriweather', serif; font-size: 1.125rem; line-height: 1.85; font-weight: 100; max-width: 800px; margin: 0 auto; }
        .content-body p { margin-bottom: 1.2rem; }
        .content-body h4 { font-size: 1.2rem; font-weight: 700; margin: 1.5rem 0 1rem; }
        
        /* Preserve Formatting from Scraper */
        .content-body strong, .content-body b { font-weight: 700; }
        .content-body em, .content-body i { font-style: italic; }
        .content-body ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        .content-body ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 1rem; }
        .content-body a { color: #3b82f6; text-decoration: underline; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .source-link { color: #3b82f6; text-decoration: underline; font-size: 0.95rem; }

        #auth-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); z-index: 100; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .hidden { display: none !important; }

        /* Gemini AI Summary Styling */
        .gemini-summary-box { font-family: 'Inter', sans-serif; }
        .gemini-summary-box ul { list-style-type: disc; padding-left: 1.5rem; margin-top: 0.5rem; }
        .gemini-summary-box li { margin-bottom: 0.5rem; }
        .gemini-summary-box strong { font-weight: 900; color: #1e40af; }
        .dark .gemini-summary-box strong { color: #93c5fd; }
        
        /* Custom Input styling for Gemini */
        .gemini-input-container:focus-within {
            box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.5);
            border-color: transparent;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#0f172a] text-gray-900 dark:text-gray-100">

    <div id="auth-overlay">
        <div class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-2xl max-w-md w-full mx-4 border border-gray-200 dark:border-gray-700">
            <h2 class="text-2xl font-bold mb-2 text-center text-gray-900 dark:text-white">Authorized Access Only</h2>
            <p class="text-sm text-gray-500 text-center mb-6">Please log in to access the UPSC archive.</p>
            <div id="auth-error" class="hidden mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm text-center"></div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Email</label>
                    <input type="email" id="email-input" class="w-full px-4 py-2 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 focus:ring-2 focus:ring-blue-500 outline-none text-gray-900 dark:text-white">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
                    <input type="password" id="password-input" class="w-full px-4 py-2 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 focus:ring-2 focus:ring-blue-500 outline-none text-gray-900 dark:text-white" onkeypress="if(event.key === 'Enter') handleLogin()">
                </div>
                <div class="pt-2">
                    <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-xl transition-colors">Log In</button>
                </div>
            </div>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <nav class="sticky top-0 z-40 px-4 py-2 border-b shadow-sm bg-white dark:bg-[#1e293b] border-gray-200 dark:border-gray-700">
            <div class="flex items-end justify-between flex-wrap gap-3 pb-1">
                <div class="flex items-center space-x-3 mb-0.5">
                    <button onclick="toggleSidebar()" class="p-1.5 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"><i class="fas fa-bars text-lg text-gray-700 dark:text-gray-200"></i></button>
                    <div>
                        <h1 class="font-bold text-base tracking-tight leading-none text-gray-900 dark:text-white">CSE CAff</h1>
                        <div class="text-blue-500 text-[10px] font-normal leading-tight mt-0.5">by onkiponkizuzuzu</div>
                        <div id="prelims-counter" class="text-[10px] text-blue-600 dark:text-blue-400 font-medium leading-tight mt-0.5">
                            Days to Prelims: <span id="days-count" class="font-semibold">...</span>
                        </div>
                    </div>
                </div>

                <div class="flex items-end gap-2 flex-1 max-w-sm">
                    <div class="w-1/2 flex flex-col">
                        <label class="text-[10px] text-gray-500 dark:text-gray-400 font-semibold mb-0.5 ml-1 uppercase tracking-wider">Source</label>
                        <select id="topic-select" onchange="switchTopic(this.value)" class="w-full h-[34px] bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-sm rounded-lg focus:ring-blue-500 px-2 text-gray-900 dark:text-white outline-none cursor-pointer transition-colors"></select>
                    </div>
                    <div class="w-1/2 flex flex-col">
                        <label class="text-[10px] text-gray-500 dark:text-gray-400 font-semibold mb-0.5 ml-1 uppercase tracking-wider">Category</label>
                        <select id="subtopic-select" onchange="switchSubtopic(this.value)" class="w-full h-[34px] bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-sm rounded-lg focus:ring-blue-500 px-2 text-gray-900 dark:text-white outline-none cursor-pointer transition-colors"></select>
                    </div>
                </div>

                <div class="flex items-end gap-2">
                    <div class="relative w-28 sm:w-48">
                        <input type="text" id="searchInput" onkeyup="handleSearch()" placeholder="Search..." class="w-full h-[34px] pl-8 pr-2 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm text-gray-900 dark:text-white">
                        <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 opacity-30 text-sm text-gray-700 dark:text-gray-400"></i>
                    </div>
                    <button onclick="promptForKey()" title="Set Gemini API Key" class="h-[34px] w-[34px] flex items-center justify-center rounded-xl bg-purple-100 dark:bg-purple-900 text-purple-600 transition-transform hover:scale-110">
                        <i class="fas fa-key"></i>
                    </button>
                    <button onclick="toggleImmersive()" id="immersive-btn" title="Immersive Reader" class="h-[34px] w-[34px] flex items-center justify-center text-sm font-medium rounded-xl border border-gray-300 dark:border-gray-600 hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-700 dark:text-gray-200">
                        <i class="fas fa-book-open"></i>
                    </button>
                    <button onclick="toggleDarkMode()" title="Toggle Theme" class="h-[34px] w-[34px] flex items-center justify-center rounded-xl bg-gray-100 dark:bg-gray-800 transition-transform hover:scale-110">
                        <i id="theme-icon" class="fas fa-moon text-blue-500"></i>
                    </button>
                    <button onclick="showArchivedView()" title="Archived" class="h-[34px] w-[34px] flex items-center justify-center rounded-xl bg-gray-100 dark:bg-gray-800 transition-transform hover:scale-110">
                        <i class="fas fa-archive text-gray-600 dark:text-gray-300"></i>
                    </button>
                    <button onclick="handleLogout()" title="Logout" class="h-[34px] w-[34px] flex items-center justify-center rounded-xl border border-red-200 dark:border-red-900 hover:bg-red-50 dark:hover:bg-red-900 text-red-600 transition-colors">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </nav>

        <div class="flex">
            <aside id="sidebar" class="border-r p-6 hidden md:block collapsed bg-white dark:bg-[#1e293b] border-gray-200 dark:border-gray-700">
                <h3 class="text-xs font-bold uppercase opacity-40 mb-6 tracking-widest text-gray-900 dark:text-gray-400">Navigation</h3>
                <div id="date-list" class="space-y-1"></div>
            </aside>
            <main class="flex-1 px-4 md:px-12 py-8 min-h-screen bg-slate-50 dark:bg-[#0f172a]">
                <div id="article-feed" class="max-w-3xl mx-auto"></div>
            </main>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDY3HiW87T204-6jTpSwZp72QkzYe4jz2o", authDomain: "csecaffreader.firebaseapp.com", projectId: "csecaffreader", storageBucket: "csecaffreader.firebasestorage.app", messagingSenderId: "478819279571", appId: "1:478819279571:web:d8956a3156960747776a26" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        const authOverlay = document.getElementById('auth-overlay'), appContent = document.getElementById('app-content'), authError = document.getElementById('auth-error'), sidebar = document.getElementById('sidebar');
        
        let currentUser = null;
        let rawData = [];
        let activeTopic = 'The Hindu';
        let activeSubtopic = 'Environment';
        let isSearch = false;
        let immersiveEnabled = false;
        let isArchiveView = false;
        let archivedUrls = JSON.parse(localStorage.getItem('archivedUrls') || '[]');

        const topics = { "The Hindu": ["Science", "Health", "Agriculture", "Environment", "Internet"], "Indian Express": ["UPSC Quizzes", "UPSC Current Affairs"] };

        function updatePrelimsCounter() {
            const prelimsDate = new Date("May 24, 2026 00:00:00").getTime();
            const daysLeft = Math.floor((prelimsDate - new Date().getTime()) / (1000 * 60 * 60 * 24));
            document.getElementById("days-count").innerText = daysLeft > 0 ? daysLeft : "0";
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user; authOverlay.classList.add('hidden'); appContent.classList.remove('hidden');
                updatePrelimsCounter(); initApp(); 
            } else {
                currentUser = null; authOverlay.classList.remove('hidden'); appContent.classList.add('hidden');
            }
        });

        async function initApp() {
            if(rawData.length > 0) return; 
            const feed = document.getElementById('article-feed');
            feed.innerHTML = `<div class="text-center py-20 text-gray-900 dark:text-white"><i class="fas fa-spinner fa-spin text-4xl text-blue-500"></i></div>`;
            try {
                const res = await fetch('data.json');
                rawData = await res.json();
                rawData.sort((a, b) => b.date.localeCompare(a.date));
                renderTopicTabs(); renderView('The Hindu', 'Environment');
            } catch (e) { feed.innerHTML = `<div class="text-center py-20 text-gray-900 dark:text-white"><p>No data found yet.</p></div>`; }
        }

        function renderTopicTabs() {
            document.getElementById('topic-select').innerHTML = Object.keys(topics).map(t => `<option value="${t}" ${activeTopic === t ? 'selected' : ''}>${t}</option>`).join('');
            if (!isArchiveView) renderSubtopicTabs();
        }

        function renderSubtopicTabs() {
            document.getElementById('subtopic-select').innerHTML = topics[activeTopic].map(s => `<option value="${s}" ${activeSubtopic === s ? 'selected' : ''}>${s}</option>`).join('');
        }

        function renderDateSidebar() {
            const viewArts = isArchiveView 
                ? rawData.filter(a => archivedUrls.includes(a.url)) 
                : rawData.filter(a => a.category === activeSubtopic && !archivedUrls.includes(a.url));
            
            const grouped = {};
            viewArts.forEach(a => {
                if(!grouped[a.date]) grouped[a.date] = [];
                grouped[a.date].push(a);
            });
            
            const dates = Object.keys(grouped).sort((a, b) => b.localeCompare(a));
            let html = '';
            
            dates.forEach(d => {
                html += `<div class="font-bold text-blue-600 dark:text-blue-400 mt-5 mb-2 text-xs uppercase tracking-wider">${d}</div>`;
                grouped[d].forEach(art => {
                    const safeId = 'art_' + encodeURIComponent(art.url).replace(/[^a-zA-Z0-9]/g, '');
                    html += `<button onclick="scrollToArticle('${safeId}')" class="block w-full text-left px-2 py-1.5 text-[11px] rounded transition-colors hover:bg-slate-100 dark:hover:bg-slate-800 text-gray-600 dark:text-gray-400 truncate mb-1" title="${art.title}">${art.title}</button>`;
                });
            });
            
            document.getElementById('date-list').innerHTML = html || `<p class="text-sm text-gray-500 mt-4">No articles found.</p>`;
        }

        function scrollToArticle(id) {
            const el = document.getElementById(id);
            if(el) {
                el.scrollIntoView({behavior: 'smooth', block: 'start'});
                const content = document.getElementById('content-' + id);
                if(content.style.display === 'none') toggleArticle(id);
            }
        }

        function switchTopic(topic) { 
            isArchiveView = false;
            activeTopic = topic; 
            activeSubtopic = topics[topic][0]; 
            renderTopicTabs(); 
            renderView(activeTopic, activeSubtopic); 
        }

        function switchSubtopic(sub) { 
            isArchiveView = false;
            activeSubtopic = sub; 
            renderView(activeTopic, activeSubtopic); 
        }

        function toggleArchive(urlEncoded) {
            const url = decodeURIComponent(urlEncoded);
            if (archivedUrls.includes(url)) {
                archivedUrls = archivedUrls.filter(u => u !== url);
            } else {
                archivedUrls.push(url);
            }
            localStorage.setItem('archivedUrls', JSON.stringify(archivedUrls));
            
            if (isArchiveView) {
                showArchivedView();
            } else {
                renderView(activeTopic, activeSubtopic);
            }
        }

        function showArchivedView() {
            isArchiveView = true;
            isSearch = false;
            document.getElementById('searchInput').value = "";
            
            // Temporary labels to signify view, without injecting an actual category that breaks dropdown mapping
            document.getElementById('topic-select').innerHTML = `<option value="" hidden selected>Archived</option>` + Object.keys(topics).map(t => `<option value="${t}">${t}</option>`).join('');
            document.getElementById('subtopic-select').innerHTML = `<option value="" hidden selected>Saved Articles</option>` + topics[activeTopic].map(s => `<option value="${s}">${s}</option>`).join('');
            
            const filtered = rawData.filter(a => archivedUrls.includes(a.url));
            renderDateSidebar();
            renderFeed(filtered, "Archived Articles");
        }

        function handleSearch() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            if (q.length < 2) { 
                isSearch = false; 
                if (isArchiveView) {
                    showArchivedView();
                } else {
                    renderFeed(rawData.filter(a => a.category === activeSubtopic && !archivedUrls.includes(a.url))); 
                }
                return; 
            }
            isSearch = true;
            let baseArts = isArchiveView 
                ? rawData.filter(a => archivedUrls.includes(a.url)) 
                : rawData.filter(a => a.category === activeSubtopic && !archivedUrls.includes(a.url));
                
            const filtered = baseArts.filter(art => art.title.toLowerCase().includes(q) || art.content.some(c => c.type === 'quiz_item' ? (c.question?.toLowerCase().includes(q) || c.solution?.toLowerCase().includes(q)) : c.value?.toLowerCase().includes(q)));
            renderFeed(filtered, `Search results for: "${q}"`);
        }

        function renderView(topic, subtopic) {
            isArchiveView = false;
            isSearch = false; 
            activeTopic = topic; 
            activeSubtopic = subtopic;
            document.getElementById('searchInput').value = ""; 
            renderTopicTabs(); 
            
            const filtered = rawData.filter(a => a.category === subtopic && !archivedUrls.includes(a.url));
            renderDateSidebar();
            renderFeed(filtered);
        }

        function toggleArticle(id) {
            const content = document.getElementById('content-' + id), icon = document.getElementById('icon-' + id);
            content.style.display = content.style.display === 'none' ? 'block' : 'none';
            icon.className = content.style.display === 'none' ? 'fas fa-chevron-down text-blue-500 text-xl' : 'fas fa-chevron-up text-blue-500 text-xl';
            if (immersiveEnabled && content.style.display === 'block') setTimeout(applyImmersiveToAll, 50);
        }

        function promptForKey() {
            const currentKey = localStorage.getItem('GEMINI_API_KEY') || '';
            const newKey = prompt("Enter your Gemini API Key for on-demand generation:", currentKey);
            if (newKey !== null) {
                localStorage.setItem('GEMINI_API_KEY', newKey.trim());
                alert("Key saved securely in your browser!");
            }
        }

        function formatGeminiText(text) {
            if (!text) return '';
            let html = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.*?)\n/g, '<li>$1</li>');
            html = html.replace(/\n/g, '<br>');
            if (html.includes('<li>')) html = '<ul>' + html + '</ul>';
            return html;
        }

        async function executeGeminiCommand(safeId, urlEncoded) {
            const apiKey = localStorage.getItem('GEMINI_API_KEY');
            if (!apiKey) {
                promptForKey();
                return;
            }

            const inputEl = document.getElementById(`gemini-input-${safeId}`);
            let userCommand = inputEl.value.trim();
            if (!userCommand) {
                userCommand = inputEl.placeholder;
            }

            const url = decodeURIComponent(urlEncoded);
            const article = rawData.find(a => a.url === url);
            if (!article) return;

            let fullText = "";
            article.content.forEach(c => {
                if (c.type === 'text' || c.type === 'heading') fullText += c.value + "\n";
                if (c.type === 'quiz_item') fullText += c.question + "\n" + c.solution + "\n";
            });

            const summaryBox = document.getElementById(`gemini-${safeId}`);
            const summaryContent = document.getElementById(`gemini-content-${safeId}`);
            const sendIcon = document.getElementById(`gemini-send-icon-${safeId}`);

            summaryBox.classList.remove('hidden');
            summaryContent.innerHTML = `<span class="flex items-center gap-2"><span class="material-symbols-outlined animate-spin text-purple-500">progress_activity</span> Asking Gemini...</span>`;
            
            sendIcon.innerText = 'progress_activity';
            sendIcon.classList.add('animate-spin');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: userCommand + "\n\nContent:\n" + fullText }] }]
                    })
                });

                const data = await response.json();
                
                sendIcon.innerText = 'send';
                sendIcon.classList.remove('animate-spin');

                if (data.error) throw new Error(data.error.message);
                
                const rawText = data.candidates[0].content.parts[0].text;
                summaryContent.innerHTML = formatGeminiText(rawText);

            } catch (error) {
                sendIcon.innerText = 'send';
                sendIcon.classList.remove('animate-spin');
                summaryContent.innerHTML = `<span class="text-red-500">Error: ${error.message}</span>`;
            }
        }

        function renderFeed(arts, title = null) {
            const feed = document.getElementById('article-feed');
            let html = title ? `<h2 class="text-xl font-bold mb-6 opacity-40 text-gray-900 dark:text-white">${title}</h2>` : "";
            if (!arts.length) return feed.innerHTML = html + `<p class="text-center py-20 opacity-30 text-gray-900 dark:text-white">No content found.</p>`;
            
            feed.innerHTML = html + arts.map(art => {
                const safeId = 'art_' + encodeURIComponent(art.url).replace(/[^a-zA-Z0-9]/g, '');
                
                // Identify path
                let artTopic = "Unknown";
                for (const [t, subs] of Object.entries(topics)) {
                    if (subs.includes(art.category)) { artTopic = t; break; }
                }
                const pathText = `${artTopic} / ${art.category}`;
                const isArchived = archivedUrls.includes(art.url);
                
                const geminiBlock = `
                    <div class="mt-8 pt-6 border-t border-gray-200 dark:border-gray-800">
                        <div class="gemini-input-container flex items-center bg-slate-100 dark:bg-slate-800 rounded-[28px] px-2 py-1 border border-gray-200 dark:border-gray-700 focus-within:shadow-md transition-shadow">
                            <button disabled class="p-2 flex items-center justify-center text-purple-500">
                                <span class="material-symbols-outlined">spark</span>
                            </button>
                            <input type="text" id="gemini-input-${safeId}" 
                                class="flex-1 bg-transparent outline-none text-sm text-gray-800 dark:text-gray-200 placeholder-gray-500 dark:placeholder-gray-400 py-2.5"
                                placeholder="Provide a UPSC-ready summary of the content in 300 words in bullet points without missing key details."
                                onkeypress="if(event.key === 'Enter') executeGeminiCommand('${safeId}', '${encodeURIComponent(art.url)}')">
                            <button onclick="executeGeminiCommand('${safeId}', '${encodeURIComponent(art.url)}')" 
                                class="p-2 mr-1 rounded-full text-gray-400 hover:bg-slate-200 dark:hover:bg-slate-700 hover:text-gray-800 dark:hover:text-gray-200 transition-colors flex items-center justify-center">
                                <span id="gemini-send-icon-${safeId}" class="material-symbols-outlined">send</span>
                            </button>
                        </div>
                        <div id="gemini-${safeId}" class="hidden gemini-summary-box mt-4 p-5 bg-purple-50 dark:bg-[#1e1b4b]/40 rounded-2xl text-sm leading-relaxed text-gray-800 dark:text-gray-200 border border-purple-100 dark:border-purple-900/50">
                            <div id="gemini-content-${safeId}" class="font-bold"></div>
                        </div>
                    </div>
                `;

                return `<article id="${safeId}" class="article-card border-gray-200 dark:border-gray-700">
                    <div onclick="toggleArticle('${safeId}')" class="flex items-center justify-between cursor-pointer text-gray-900 dark:text-white group">
                        <h2 class="serif-title article-title pr-4 flex-1">${art.title}</h2>
                        <div class="flex items-center whitespace-nowrap pl-2">
                            <button onclick="event.stopPropagation(); toggleArchive('${encodeURIComponent(art.url)}')" class="text-gray-400 hover:text-blue-500 transition-colors mr-4" title="${isArchived ? 'Unarchive' : 'Archive'}">
                                <i class="fas ${isArchived ? 'fa-box-open text-blue-500' : 'fa-archive'} text-lg"></i>
                            </button>
                            <i id="icon-${safeId}" class="fas fa-chevron-down text-blue-500 text-lg"></i>
                        </div>
                    </div>
                    <div id="content-${safeId}" class="content-body mt-4 text-gray-800 dark:text-gray-300" style="display: none;">
                        ${art.content.map(c => c.type === 'quiz_item' ? 
                            `<div class="quiz-container mb-6">
                                <div class="quiz-question font-semibold text-gray-900 dark:text-white">${c.question}</div>
                                <details class="quiz-solution bg-slate-100 dark:bg-slate-800 rounded-lg p-3 mt-3 border-l-4 border-blue-500" ontoggle="if(this.open && immersiveEnabled) setTimeout(applyImmersiveToAll, 50)">
                                    <summary class="cursor-pointer text-blue-500 font-bold outline-none"><i class="fas fa-lightbulb mr-2"></i>Show Answer</summary>
                                    <div class="quiz-solution-text mt-3 text-sm">${c.solution}</div>
                                </details>
                            </div>` 
                            : (c.type === 'heading' ? `<h4 class="font-bold text-gray-900 dark:text-white mt-4 mb-2">${c.value}</h4>` : `<p class="mb-4">${c.value}</p>`)
                        ).join('')}
                        
                        ${geminiBlock}

                        <div class="mt-8 pt-4 border-t border-gray-200 dark:border-gray-700">
                            <a href="${art.url}" target="_blank" class="source-link">Read original page →</a>
                        </div>
                    </div>
                    <div class="text-xs text-gray-500 mt-2">${pathText} | ${art.date}</div>
                </article>`;
            }).join('');
            if (immersiveEnabled) setTimeout(applyImmersiveToAll, 50);
        }

        function toggleSidebar() { sidebar.classList.toggle('collapsed'); }

        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            document.body.classList.toggle('dark');
            document.getElementById('theme-icon').className = isDark ? 'fas fa-sun text-yellow-400' : 'fas fa-moon text-blue-500';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            if (immersiveEnabled) applyImmersiveToAll(); 
        }

        function handleLogout() { auth.signOut(); }
        function handleLogin() { const e = document.getElementById('email-input').value, p = document.getElementById('password-input').value; if(e && p) auth.signInWithEmailAndPassword(e, p).catch(err => { authError.textContent = err.message; authError.classList.remove('hidden'); setTimeout(() => authError.classList.add('hidden'), 5000); }); }

        function toggleImmersive() {
            immersiveEnabled = !immersiveEnabled;
            const btn = document.getElementById('immersive-btn');
            if (immersiveEnabled) { btn.classList.add('bg-red-100', 'border-red-500'); applyImmersiveToAll(); } 
            else { btn.classList.remove('bg-red-100', 'border-red-500'); document.querySelectorAll('[data-orig]').forEach(el => el.innerHTML = el.getAttribute('data-orig')); }
        }

        function applyImmersiveToAll() {
            if (!immersiveEnabled) return;
            const targets = document.querySelectorAll('.content-body:not([style*="display: none"]) p, .content-body:not([style*="display: none"]) .quiz-question, .content-body:not([style*="display: none"]) .quiz-solution-text');
            const cRed = [159, 18, 57], cBlue = [30, 64, 175];
            targets.forEach(el => {
                if (!el.hasAttribute('data-orig')) el.setAttribute('data-orig', el.innerHTML);
                el.innerHTML = el.getAttribute('data-orig');
                const words = el.textContent.split(/(\s+)/); el.innerHTML = '';
                words.forEach(w => { if (w.trim() === '') el.appendChild(document.createTextNode(w)); else { const s = document.createElement('span'); s.textContent = w; el.appendChild(s); } });
                let line = [], lines = [], lastT = -1;
                el.querySelectorAll('span').forEach(s => { const t = s.offsetTop; if (t !== lastT) { if (line.length) lines.push(line); line = []; lastT = t; } line.push(s); });
                if (line.length) lines.push(line);
                lines.forEach((l, i) => { const start = i % 2 === 0 ? cRed : cBlue, end = i % 2 === 0 ? cBlue : cRed; l.forEach((s, wi) => { const r = l.length > 1 ? wi / (l.length - 1) : 0; s.style.color = `rgb(${Math.round(start[0] + (end[0]-start[0])*r)},${Math.round(start[1] + (end[1]-start[1])*r)},${Math.round(start[2] + (end[2]-start[2])*r)})`; }); });
            });
        }

        window.onload = () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark');
                document.body.classList.add('dark');
                document.getElementById('theme-icon').className = 'fas fa-sun text-yellow-400';
            } else {
                document.documentElement.classList.remove('dark');
                document.body.classList.remove('dark');
                document.getElementById('theme-icon').className = 'fas fa-moon text-blue-500';
            }
            sidebar.classList.add('collapsed');
            updatePrelimsCounter();
        };
    </script>
</body>
</html>
