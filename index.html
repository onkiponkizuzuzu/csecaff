<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSE CAff by onkiponkizuzuzu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&family=Merriweather:wght@200;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --bg: #f8fafc; --text: #0f172a; --border: #e2e8f0; --sidebar: #ffffff; }
        .dark { --bg: #0f172a; --text: #f1f5f9; --border: #334155; --sidebar: #1e293b; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); transition: all 0.3s; margin: 0; min-height: 100vh; }
        .serif-title { font-family: 'Merriweather', serif; }
        nav, aside { background-color: var(--sidebar); border-color: var(--border); }
        .article-card { border-bottom: 2px solid var(--border); padding-bottom: 2rem; margin-bottom: 3rem; width: 100%; }
        #sidebar { transition: all 0.3s ease; width: 280px; position: sticky; top: 60px; height: calc(100vh - 60px); overflow-y: auto; }
        #sidebar.collapsed { width: 0; padding: 0; overflow: hidden; border: none; }
        
        .article-title { font-size: 1.4rem; line-height: 1.8rem; font-weight: 600; cursor: pointer; transition: color 0.2s; }
        .article-title:hover { color: #3b82f6; }
        .content-body { font-family: 'Merriweather', serif; font-size: 1.125rem; line-height: 1.85; font-weight: 400; max-width: 800px; margin: 0 auto; }
        .content-body p { margin-bottom: 1.5rem; }
        .content-body h4 { font-size: 1.25rem; font-weight: 700; margin: 2rem 0 1rem; }
        
        /* Quiz Styles */
        .quiz-container { margin-bottom: 2rem; }
        .quiz-question { font-family: 'Inter', sans-serif; font-weight: 600; margin-bottom: 1rem; white-space: pre-wrap; }
        .quiz-solution { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 1rem 1.5rem; margin-top: 1rem; }
        .quiz-solution summary { font-family: 'Inter', sans-serif; font-weight: bold; color: #3b82f6; cursor: pointer; outline: none; transition: color 0.2s; }
        .quiz-solution summary:hover { color: #2563eb; }
        .quiz-solution-text { font-family: 'Inter', sans-serif; font-size: 1rem; margin-top: 1rem; white-space: pre-wrap; line-height: 1.6; }

        /* Immersive Reader - Alternating Directions & Darkened Dark Mode */
        .immersive-mode .content-body p:nth-of-type(odd), 
        .immersive-mode .quiz-question {
            background: linear-gradient(to right, #e11d48 0%, #2563eb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            transition: all 0.4s ease;
        }
        
        .immersive-mode .content-body p:nth-of-type(even), 
        .immersive-mode .quiz-solution-text {
            background: linear-gradient(to right, #2563eb 0%, #e11d48 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            transition: all 0.4s ease;
        }

        .dark .immersive-mode .content-body p:nth-of-type(odd), 
        .dark .immersive-mode .quiz-question {
            background: linear-gradient(to right, #be123c 0%, #1d4ed8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .dark .immersive-mode .content-body p:nth-of-type(even), 
        .dark .immersive-mode .quiz-solution-text {
            background: linear-gradient(to right, #1d4ed8 0%, #be123c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .source-link { color: #3b82f6; text-decoration: underline; font-size: 0.95rem; }

        /* Auth Overlay */
        #auth-overlay {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); z-index: 100;
            display: flex; justify-content: center; align-items: center; backdrop-filter: blur(5px);
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-2xl max-w-md w-full mx-4 border border-gray-200 dark:border-gray-700">
            <h2 class="text-2xl font-bold mb-2 text-center text-gray-900 dark:text-white">Authorized Access Only</h2>
            <p class="text-sm text-gray-500 text-center mb-6">Please log in to access the UPSC archive.</p>
            
            <div id="auth-error" class="hidden mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm text-center"></div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Email</label>
                    <input type="email" id="email-input" class="w-full px-4 py-2 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 focus:ring-2 focus:ring-blue-500 outline-none text-gray-900 dark:text-white">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
                    <input type="password" id="password-input" class="w-full px-4 py-2 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 focus:ring-2 focus:ring-blue-500 outline-none text-gray-900 dark:text-white" onkeypress="if(event.key === 'Enter') handleLogin()">
                </div>
                
                <div class="pt-2">
                    <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-xl transition-colors">Log In</button>
                </div>
            </div>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <nav class="sticky top-0 z-40 px-4 py-2 border-b shadow-sm">
            <div class="flex items-end justify-between flex-wrap gap-3 pb-1">
                <div class="flex items-center space-x-3 mb-0.5">
                    <button onclick="toggleSidebar()" class="p-1.5 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"><i class="fas fa-bars text-lg"></i></button>
                    <div>
                        <h1 class="font-bold text-base tracking-tight leading-none">CSE CAff</h1>
                        <div class="text-blue-500 text-[10px] font-normal leading-tight mt-0.5">by onkiponkizuzuzu</div>
                        <div id="prelims-counter" class="text-[10px] text-blue-600 dark:text-blue-400 font-medium leading-tight mt-0.5">
                            Days to Prelims: <span id="days-count" class="font-semibold">54</span>
                        </div>
                    </div>
                </div>

                <div class="flex items-end gap-2 flex-1 max-w-sm">
                    <div class="w-1/2 flex flex-col">
                        <label class="text-[10px] text-gray-500 dark:text-gray-400 font-semibold mb-0.5 ml-1 uppercase tracking-wider">Source</label>
                        <select id="topic-select" onchange="switchTopic(this.value)" class="w-full h-[34px] bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 px-2 dark:text-white outline-none cursor-pointer"></select>
                    </div>
                    <div class="w-1/2 flex flex-col">
                        <label class="text-[10px] text-gray-500 dark:text-gray-400 font-semibold mb-0.5 ml-1 uppercase tracking-wider">Category</label>
                        <select id="subtopic-select" onchange="switchSubtopic(this.value)" class="w-full h-[34px] bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 px-2 dark:text-white outline-none cursor-pointer"></select>
                    </div>
                </div>

                <div class="flex items-end gap-2">
                    <div class="relative w-28 sm:w-48">
                        <input type="text" id="searchInput" onkeyup="handleSearch()" placeholder="Search..." class="w-full h-[34px] pl-8 pr-2 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                        <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 opacity-30 text-sm"></i>
                    </div>
                    <button onclick="toggleImmersive()" id="immersive-btn" title="Immersive Reader" class="h-[34px] w-[34px] flex items-center justify-center text-sm font-medium rounded-xl border border-gray-300 dark:border-gray-600 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                        <i class="fas fa-book-open"></i>
                    </button>
                    <button onclick="toggleDarkMode()" title="Toggle Theme" class="h-[34px] w-[34px] flex items-center justify-center rounded-xl bg-gray-100 dark:bg-gray-800 transition-transform hover:scale-110">
                        <i id="theme-icon" class="fas fa-moon text-blue-500"></i>
                    </button>
                    
                    <div class="relative">
                        <button onclick="toggleProfileMenu(event)" title="Profile" class="h-[34px] w-[34px] flex items-center justify-center rounded-xl border border-gray-300 dark:border-gray-600 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                            <i class="fas fa-user text-blue-600 dark:text-blue-400"></i>
                        </button>
                        <div id="profile-menu" class="hidden absolute right-0 mt-2 w-36 bg-white dark:bg-gray-800 rounded-xl shadow-lg border border-gray-200 dark:border-gray-700 overflow-hidden z-50">
                            <button onclick="showSavedArticles()" class="w-full text-left px-4 py-2.5 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200 font-medium border-b border-gray-100 dark:border-gray-700"><i class="fas fa-bookmark mr-2.5 text-blue-500"></i>Saved</button>
                            <button onclick="handleLogout()" class="w-full text-left px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 dark:hover:bg-gray-700 font-medium"><i class="fas fa-sign-out-alt mr-2.5"></i>Logout</button>
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <div class="flex">
            <aside id="sidebar" class="border-r p-6 hidden md:block collapsed">
                <h3 class="text-xs font-bold uppercase opacity-40 mb-6 tracking-widest text-inherit">Historical Dates</h3>
                <div id="date-list" class="space-y-1"></div>
            </aside>

            <main class="flex-1 px-4 md:px-12 py-8 min-h-screen">
                <div id="article-feed" class="max-w-3xl mx-auto"></div>
            </main>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. FIREBASE CONFIGURATION
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDY3HiW87T204-6jTpSwZp72QkzYe4jz2o",
            authDomain: "csecaffreader.firebaseapp.com",
            projectId: "csecaffreader",
            storageBucket: "csecaffreader.firebasestorage.app",
            messagingSenderId: "478819279571",
            appId: "1:478819279571:web:d8956a3156960747776a26"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ==========================================
        // 2. AUTHENTICATION & PROFILE LOGIC
        // ==========================================
        const authOverlay = document.getElementById('auth-overlay');
        const appContent = document.getElementById('app-content');
        const authError = document.getElementById('auth-error');
        
        let currentUser = null;
        let savedArticlesMap = {};

        auth.onAuthStateChanged(async user => {
            if (user) {
                currentUser = user;
                authOverlay.classList.add('hidden');
                appContent.classList.remove('hidden');
                await loadSavedArticles();
                initApp(); 
            } else {
                currentUser = null;
                savedArticlesMap = {};
                authOverlay.classList.remove('hidden');
                appContent.classList.add('hidden');
            }
        });

        function showError(message) {
            authError.textContent = message;
            authError.classList.remove('hidden');
            setTimeout(() => authError.classList.add('hidden'), 5000);
        }

        function handleLogin() {
            const email = document.getElementById('email-input').value;
            const password = document.getElementById('password-input').value;
            if(!email || !password) return showError("Please enter email and password.");
            
            auth.signInWithEmailAndPassword(email, password)
                .catch(error => showError(error.message));
        }

        function handleLogout() {
            auth.signOut();
        }

        function toggleProfileMenu(e) {
            e.stopPropagation();
            document.getElementById('profile-menu').classList.toggle('hidden');
        }

        window.addEventListener('click', () => {
            const menu = document.getElementById('profile-menu');
            if(menu && !menu.classList.contains('hidden')) {
                menu.classList.add('hidden');
            }
        });

        // ==========================================
        // 3. FIRESTORE SAVING LOGIC
        // ==========================================
        async function loadSavedArticles() {
            if(!currentUser) return;
            const snapshot = await db.collection('users').doc(currentUser.uid).collection('saved').get();
            savedArticlesMap = {};
            snapshot.forEach(doc => {
                const art = doc.data();
                savedArticlesMap[art.url] = art;
            });
        }

        async function toggleSaveArticle(url, event) {
            event.stopPropagation();
            if(!currentUser) return;

            const safeId = 'art_' + encodeURIComponent(url).replace(/[^a-zA-Z0-9]/g, '');
            const firestoreId = encodeURIComponent(url).replace(/\./g, '%2E'); 
            
            const ref = db.collection('users').doc(currentUser.uid).collection('saved').doc(firestoreId);
            const icon = document.getElementById('save-icon-' + safeId);

            if(savedArticlesMap[url]) {
                await ref.delete();
                delete savedArticlesMap[url];
                if(icon) icon.className = "far fa-bookmark text-gray-400 hover:text-blue-500 ml-3 text-xl transition-colors";
                
                if(activeTopic === 'Saved') showSavedArticles(); 
            } else {
                const art = rawData.find(a => a.url === url) || savedArticlesMap[url];
                if(art) {
                    await ref.set(art);
                    savedArticlesMap[url] = art;
                    if(icon) icon.className = "fas fa-bookmark text-blue-500 ml-3 text-xl transition-colors";
                }
            }
        }

        function showSavedArticles() {
            activeTopic = 'Saved';
            activeSubtopic = '';
            activeDate = null;
            document.getElementById('searchInput').value = "";
            isSearch = false;
            
            document.getElementById('topic-select').value = "";
            document.getElementById('subtopic-select').innerHTML = "<option value=''>Saved Articles</option>";
            
            renderDateSidebar();
            const savedArray = Object.values(savedArticlesMap).sort((a, b) => b.date.localeCompare(a.date));
            renderFeed(savedArray, "Your Saved Articles");
            document.getElementById('profile-menu').classList.add('hidden');
        }

        // ==========================================
        // 4. MAIN APP LOGIC
        // ==========================================
        let rawData = [], activeTopic = 'The Hindu', activeSubtopic = 'Environment', activeDate = null, isSearch = false;
        let immersiveEnabled = false;

        const topics = {
            "The Hindu": ["Science", "Health", "Agriculture", "Environment", "Internet"],
            "Indian Express": ["UPSC Quizzes", "UPSC Current Affairs"]
        };

        async function initApp() {
            if(rawData.length > 0) return; 
            const feed = document.getElementById('article-feed');
            feed.innerHTML = `<div class="text-center py-20"><i class="fas fa-spinner fa-spin text-4xl text-blue-500"></i><p class="mt-4 opacity-70">Loading archive...</p></div>`;

            try {
                const res = await fetch('data.json');
                if (!res.ok) throw new Error('File not found');
                rawData = await res.json();
                rawData.sort((a, b) => b.date.localeCompare(a.date));
                renderTopicTabs();
                renderView('The Hindu', 'Environment');
            } catch (e) {
                feed.innerHTML = `<div class="text-center py-20"><p class="text-xl font-medium opacity-80">No data found yet.</p></div>`;
            }
        }

        function renderTopicTabs() {
            const html = Object.keys(topics).map(topic => `
                <option value="${topic}" ${activeTopic === topic ? 'selected' : ''}>${topic}</option>
            `).join('');
            document.getElementById('topic-select').innerHTML = html;
            renderSubtopicTabs();
        }

        function renderSubtopicTabs() {
            if (activeTopic === 'Saved') return;
            const subs = topics[activeTopic];
            const html = subs.map(sub => `
                <option value="${sub}" ${activeSubtopic === sub ? 'selected' : ''}>${sub}</option>
            `).join('');
            document.getElementById('subtopic-select').innerHTML = html;
        }

        function renderDateSidebar() {
            let targetArray = activeTopic === 'Saved' ? Object.values(savedArticlesMap) : rawData;
            const dates = [...new Set(targetArray.map(a => a.date))].sort((a, b) => b.localeCompare(a));
            const html = dates.map(date => `
                <button onclick="filterByDate('${date}')" class="block w-full text-left px-3 py-2 mt-1 text-sm rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors ${activeDate === date ? 'font-bold text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-gray-800' : 'text-gray-600 dark:text-gray-400'}">
                    ${date}
                </button>
            `).join('');
            document.getElementById('date-list').innerHTML = html || '<p class="text-sm opacity-50">No dates found</p>';
        }

        function filterByDate(date) {
            activeDate = date;
            isSearch = false;
            document.getElementById('searchInput').value = "";
            renderDateSidebar(); 
            
            let filtered;
            if(activeTopic === 'Saved') {
                filtered = Object.values(savedArticlesMap).filter(a => a.date === activeDate);
            } else {
                filtered = rawData.filter(a => a.category === activeSubtopic && a.date === activeDate);
            }
            
            renderFeed(filtered, `Showing articles from ${date}`);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function switchTopic(topic) { 
            activeTopic = topic; 
            activeSubtopic = topics[topic][0]; 
            renderTopicTabs(); 
            renderView(activeTopic, activeSubtopic); 
        }

        function switchSubtopic(subtopic) {
            activeSubtopic = subtopic;
            renderView(activeTopic, activeSubtopic);
        }

        function handleSearch() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            if (q.length < 2) { 
                isSearch = false; 
                let filtered = activeTopic === 'Saved' ? Object.values(savedArticlesMap) : rawData.filter(a => a.category === activeSubtopic);
                if (activeDate) filtered = filtered.filter(a => a.date === activeDate);
                renderFeed(filtered); 
                return; 
            }
            isSearch = true;
            let baseArray = activeTopic === 'Saved' ? Object.values(savedArticlesMap) : rawData;
            const filtered = baseArray.filter(art => {
                return art.title.toLowerCase().includes(q) || art.content.some(c => {
                    if (c.type === 'quiz_item') return (c.question && c.question.toLowerCase().includes(q)) || (c.solution && c.solution.toLowerCase().includes(q));
                    return c.value && c.value.toLowerCase().includes(q);
                });
            });
            renderFeed(filtered, `Search results for: "${q}"`);
        }

        function renderView(topic, subtopic) {
            isSearch = false; activeTopic = topic; activeSubtopic = subtopic; activeDate = null;
            document.getElementById('searchInput').value = "";
            renderTopicTabs();
            renderDateSidebar();
            renderFeed(rawData.filter(a => a.category === subtopic));
        }

        function toggleArticle(id) {
            const content = document.getElementById('content-' + id);
            const icon = document.getElementById('icon-' + id);
            if (content.style.display === 'none') {
                content.style.display = 'block';
                icon.className = 'fas fa-chevron-up text-blue-500 ml-4';
                if (immersiveEnabled) setTimeout(applyImmersiveToAll, 50);
            } else {
                content.style.display = 'none';
                icon.className = 'fas fa-chevron-down text-blue-500 ml-4';
            }
        }

        function renderContentBlock(item) {
            if (item.type === 'quiz_item') {
                return `<div class="quiz-container"><div class="quiz-question">${item.question}</div><details class="quiz-solution" ontoggle="if(this.open && immersiveEnabled) setTimeout(applyImmersiveToAll, 50)"><summary><i class="fas fa-lightbulb mr-2"></i>View Solution & Explanation</summary><div class="quiz-solution-text">${item.solution}</div></details></div>`;
            }
            return item.type === 'heading' ? `<h4>${item.value}</h4>` : `<p>${item.value}</p>`;
        }

        function renderFeed(arts, title = null) {
            const feed = document.getElementById('article-feed');
            let html = title ? `<h2 class="text-xl font-bold mb-8 opacity-40">${title}</h2>` : "";
            if (!arts.length) {
                feed.innerHTML = html + `<p class="text-center py-20 opacity-30">No content found.</p>`;
                if (immersiveEnabled) setTimeout(applyImmersiveToAll, 50);
                return;
            }

            feed.innerHTML = html + arts.map((art, index) => {
                const safeId = 'art_' + encodeURIComponent(art.url).replace(/[^a-zA-Z0-9]/g, '');
                const isSaved = !!savedArticlesMap[art.url];
                const saveClass = isSaved ? "fas fa-bookmark text-blue-500" : "far fa-bookmark text-gray-400 hover:text-blue-500";

                return `
                <article class="article-card">
                    <div onclick="toggleArticle('${safeId}')" class="flex items-start justify-between cursor-pointer">
                        <h2 class="serif-title article-title pr-4">${art.title}</h2>
                        <div class="flex items-center whitespace-nowrap mt-1">
                            <i onclick="toggleSaveArticle('${art.url}', event)" id="save-icon-${safeId}" class="${saveClass} ml-3 text-xl transition-colors" title="Save Article"></i>
                            <i id="icon-${safeId}" class="fas fa-chevron-down text-blue-500 ml-5 text-xl"></i>
                        </div>
                    </div>
                    <div id="content-${safeId}" class="content-body mt-6" style="display: none;">
                        ${art.content.map(renderContentBlock).join('')}
                        <div class="mt-8 pt-4 border-t">
                            <a href="${art.url}" target="_blank" class="source-link">Read original page →</a>
                        </div>
                    </div>
                    <div class="text-xs text-gray-500 mt-4">${art.category} | ${art.date}</div>
                </article>`;
            }).join('');

            if (immersiveEnabled) setTimeout(applyImmersiveToAll, 50);
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
        
        function toggleDarkMode() {
            const dark = document.body.classList.toggle('dark');
            document.getElementById('theme-icon').className = dark ? 'fas fa-sun text-yellow-400' : 'fas fa-moon text-blue-500';
            localStorage.setItem('theme', dark ? 'dark' : 'light');
            if (immersiveEnabled) applyImmersiveToAll(); 
        }

        // ==========================================
        // 5. IMMERSIVE READER (True Line-by-Line Logic)
        // ==========================================
        let resizeTimeout;
        
        function toggleImmersive() {
            immersiveEnabled = !immersiveEnabled;
            const btn = document.getElementById('immersive-btn');
            
            if (immersiveEnabled) {
                btn.classList.add('bg-red-100', 'dark:bg-red-900', 'border-red-500', 'text-red-700', 'dark:text-red-300');
                applyImmersiveToAll();
                window.addEventListener('resize', debounceApplyImmersive);
            } else {
                btn.classList.remove('bg-red-100', 'dark:bg-red-900', 'border-red-500', 'text-red-700', 'dark:text-red-300');
                removeImmersiveFromAll();
                window.removeEventListener('resize', debounceApplyImmersive);
            }
        }

        function debounceApplyImmersive() {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                if(immersiveEnabled) applyImmersiveToAll();
            }, 250);
        }

        function applyImmersiveToAll() {
            if (!immersiveEnabled) return;
            const targets = document.querySelectorAll('.content-body:not([style*="display: none"]) p, .content-body:not([style*="display: none"]) .quiz-question, .content-body:not([style*="display: none"]) .quiz-solution-text');
            const isDark = document.body.classList.contains('dark');
            
            const cRed = isDark ? [253, 164, 175] : [159, 18, 57];
            const cBlue = isDark ? [147, 197, 253] : [30, 64, 175];

            targets.forEach(el => {
                if (el.offsetParent === null) return; 

                if (!el.hasAttribute('data-orig')) {
                    el.setAttribute('data-orig', el.innerHTML);
                }
                
                el.innerHTML = el.getAttribute('data-orig');
                const words = el.textContent.split(/(\s+)/);
                el.innerHTML = '';
                
                words.forEach(w => {
                    if (w.trim() === '') {
                        el.appendChild(document.createTextNode(w));
                    } else {
                        const span = document.createElement('span');
                        span.textContent = w;
                        span.style.transition = "color 0.3s";
                        el.appendChild(span);
                    }
                });

                let currentLine = [];
                let lines = [];
                let lastTop = -1;

                const spans = el.querySelectorAll('span');
                spans.forEach(span => {
                    const top = span.offsetTop;
                    if (top !== lastTop) {
                        if (currentLine.length > 0) lines.push(currentLine);
                        currentLine = [];
                        lastTop = top;
                    }
                    currentLine.push(span);
                });
                if (currentLine.length > 0) lines.push(currentLine);

                lines.forEach((line, lineIndex) => {
                    const isEven = lineIndex % 2 === 0;
                    const startColor = isEven ? cRed : cBlue;
                    const endColor = isEven ? cBlue : cRed;
                    
                    line.forEach((span, wordIndex) => {
                        const ratio = line.length > 1 ? wordIndex / (line.length - 1) : 0;
                        const r = Math.round(startColor[0] + (endColor[0] - startColor[0]) * ratio);
                        const g = Math.round(startColor[1] + (endColor[1] - startColor[1]) * ratio);
                        const b = Math.round(startColor[2] + (endColor[2] - startColor[2]) * ratio);
                        span.style.color = `rgb(${r},${g},${b})`;
                    });
                });
            });
        }

        function removeImmersiveFromAll() {
            const targets = document.querySelectorAll('.content-body p, .quiz-question, .quiz-solution-text');
            targets.forEach(el => {
                if (el.hasAttribute('data-orig')) {
                    el.innerHTML = el.getAttribute('data-orig');
                }
            });
        }
        
        window.onload = function() {
            if (localStorage.getItem('theme') === 'dark') toggleDarkMode();
            document.getElementById('sidebar').classList.add('collapsed');
        };
    </script>
</body>
