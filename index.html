<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disaster Research Hub | The Hindu Scraper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Merriweather:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .serif-title { font-family: 'Merriweather', serif; }
        
        /* Dark Mode Colors */
        .dark { background-color: #0f172a; color: #f1f5f9; }
        .dark aside { background-color: #1e293b; border-color: #334155; }
        .dark .article-card { border-color: #334155; }
        .dark .nav-bar { background-color: #1e293b; border-bottom: 1px solid #334155; }
        
        /* Sidebar Transitions */
        #sidebar { transition: all 0.3s ease; width: 280px; }
        #sidebar.collapsed { width: 0; padding: 0; overflow: hidden; border: none; }
        
        /* Article Styling */
        .article-card { border-bottom: 2px solid #e2e8f0; padding-bottom: 3rem; margin-bottom: 3rem; }
        .article-card:last-child { border-bottom: none; }
        img { border-radius: 12px; width: 100%; object-fit: cover; margin-bottom: 1.5rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="nav-bar bg-white border-b border-slate-200 sticky top-0 z-50 px-4 py-3 flex justify-between items-center">
        <div class="flex items-center space-x-4">
            <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg text-xl">
                <i class="fas fa-bars"></i>
            </button>
            <h1 class="font-bold text-xl tracking-tight hidden sm:block">Disaster Research <span class="text-blue-600">Hub</span></h1>
        </div>

        <div class="flex space-x-2 overflow-x-auto no-scrollbar max-w-md md:max-w-xl" id="category-tabs">
            </div>

        <button onclick="toggleDarkMode()" class="p-3 rounded-xl bg-slate-100 dark:bg-slate-800 hover:scale-105 transition-transform">
            <i id="theme-icon" class="fas fa-moon text-blue-600"></i>
        </button>
    </nav>

    <div class="flex">
        <aside id="sidebar" class="h-[calc(100vh-65px)] sticky top-[65px] bg-white border-r border-slate-200 p-6 overflow-y-auto z-40">
            <h3 class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-6">Archive by Date</h3>
            <div id="date-list" class="space-y-1">
                </div>
        </aside>

        <main class="flex-1 overflow-y-auto px-4 md:px-12 py-8">
            <div id="main-container" class="max-w-3xl mx-auto">
                <div id="article-feed" class="space-y-8">
                    <div class="text-center py-20">
                        <i class="fas fa-spinner fa-spin text-4xl text-blue-500 mb-4"></i>
                        <p class="text-slate-500">Loading your latest research data...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let rawData = [];
        let activeCategory = 'Environment';
        let activeDate = null;

        // 1. Initial Data Load
        async function init() {
            try {
                const res = await fetch('data.json');
                rawData = await res.json();
                
                // Group categories for the top bar
                const categories = [...new Set(rawData.map(a => a.category))];
                renderCategoryTabs(categories);
                
                // Load default section
                renderView(activeCategory);
            } catch (err) {
                document.getElementById('article-feed').innerHTML = `
                    <div class="bg-red-50 text-red-700 p-4 rounded-lg border border-red-200">
                        <strong>Error:</strong> data.json not found. Please wait for the first GitHub Action to complete.
                    </div>`;
            }
        }

        // 2. Render Navigation Tabs
        function renderCategoryTabs(categories) {
            const container = document.getElementById('category-tabs');
            container.innerHTML = categories.map(cat => `
                <button onclick="renderView('${cat}')" 
                        class="px-4 py-2 rounded-full text-sm font-semibold transition-all whitespace-nowrap
                        ${activeCategory === cat ? 'bg-blue-600 text-white shadow-md' : 'text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800'}">
                    ${cat}
                </button>
            `).join('');
        }

        // 3. Render Main View
        function renderView(category, dateFilter = null) {
            activeCategory = category;
            activeDate = dateFilter;
            
            // Re-render tabs to update active state
            const categories = [...new Set(rawData.map(a => a.category))];
            renderCategoryTabs(categories);

            // Update Sidebar Dates for this Category
            const datesForCat = [...new Set(rawData.filter(a => a.category === category).map(a => a.date))];
            const dateList = document.getElementById('date-list');
            dateList.innerHTML = `
                <button onclick="renderView('${category}', null)" 
                        class="w-full text-left px-4 py-2 rounded-lg text-sm mb-2 ${!activeDate ? 'bg-blue-50 text-blue-700 font-bold dark:bg-slate-800' : 'text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800'}">
                    All Recent
                </button>
            ` + datesForCat.map(d => `
                <button onclick="renderView('${category}', '${d}')" 
                        class="w-full text-left px-4 py-2 rounded-lg text-sm ${activeDate === d ? 'bg-blue-50 text-blue-700 font-bold dark:bg-slate-800' : 'text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800'}">
                    ${d}
                </button>
            `).join('');

            // Filter Articles
            const filtered = rawData.filter(a => 
                a.category === category && (!activeDate || a.date === activeDate)
            );

            // Render Feed
            const feed = document.getElementById('article-feed');
            if (filtered.length === 0) {
                feed.innerHTML = `<p class="text-center text-slate-400 py-10">No articles found for this selection.</p>`;
                return;
            }

            feed.innerHTML = filtered.map(art => `
                <article class="article-card">
                    <div class="flex items-center space-x-2 mb-3">
                        <span class="bg-blue-100 text-blue-700 text-[10px] px-2 py-0.5 rounded-full font-bold uppercase dark:bg-blue-900/30 dark:text-blue-400">
                            ${art.category}
                        </span>
                        <span class="text-slate-400 text-xs">• ${art.date}</span>
                    </div>
                    
                    <h2 class="serif-title text-3xl md:text-4xl mb-6 leading-tight">${art.title}</h2>
                    
                    ${art.image ? `<img src="${art.image}" alt="Feature Image" onerror="this.remove()">` : ''}
                    
                    <div class="content-body space-y-5 text-lg leading-relaxed text-slate-700 dark:text-slate-300">
                        ${art.content.map(item => {
                            if (item.type === 'heading') {
                                return `<h4 class="text-xl font-bold pt-4 text-slate-900 dark:text-white">${item.value}</h4>`;
                            }
                            return `<p>${item.value}</p>`;
                        }).join('')}
                    </div>

                    <div class="mt-8 pt-6 border-t border-dashed border-slate-200 dark:border-slate-700">
                        <a href="${art.url}" target="_blank" class="text-blue-600 font-bold text-sm hover:underline">
                            Source: The Hindu <i class="fas fa-external-link-alt ml-1"></i>
                        </a>
                    </div>
                </article>
            `).join('');
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 4. Utility Functions
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        }

        function toggleDarkMode() {
            const isDark = document.body.classList.toggle('dark');
            const icon = document.getElementById('theme-icon');
            icon.className = isDark ? 'fas fa-sun text-yellow-400' : 'fas fa-moon text-blue-600';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        // Check local storage for theme
        if (localStorage.getItem('theme') === 'dark') toggleDarkMode();

        init();
    </script>
</body>
</html>
