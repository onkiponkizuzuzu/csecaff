<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disaster Research Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .dark { background-color: #1a202c; color: #e2e8f0; }
        .sidebar { transition: transform 0.3s ease-in-out; }
        .collapsed { transform: translateX(-100%); }
        .article-card { border-bottom: 1px solid #cbd5e0; margin-bottom: 2rem; padding-bottom: 1rem; }
        .dark .article-card { border-color: #4a5568; }
        img { max-width: 100%; height: auto; border-radius: 8px; margin: 1rem 0; }
    </style>
</head>
<body class="light transition-colors duration-200">
    <nav class="bg-blue-800 text-white p-4 sticky top-0 z-50 flex justify-between items-center shadow-lg">
        <div class="flex items-center space-x-4">
            <button onclick="toggleSidebar()" class="text-2xl"><i class="fas fa-bars"></i></button>
            <h1 class="font-bold text-xl hidden md:block">Knowledge Hub</h1>
        </div>
        <div class="flex space-x-4 overflow-x-auto" id="category-nav">
            </div>
        <button onclick="toggleDarkMode()" class="p-2 rounded-full hover:bg-blue-700">
            <i id="theme-icon" class="fas fa-moon"></i>
        </button>
    </nav>

    <div class="flex">
        <aside id="sidebar" class="sidebar fixed md:relative w-64 bg-gray-100 dark:bg-gray-800 h-screen overflow-y-auto p-4 z-40 border-r dark:border-gray-700">
            <h2 class="font-bold mb-4 uppercase text-sm tracking-widest text-gray-500">History</h2>
            <div id="date-menu" class="space-y-2">
                </div>
        </aside>

        <main id="content" class="flex-1 p-6 max-w-4xl mx-auto min-h-screen">
            <div id="article-list">
                <p class="text-center mt-10">Select a subtopic to begin reading...</p>
            </div>
        </main>
    </div>

    <script>
        let fullData = [];
        let currentCategory = 'Environment';

        // Fetch the JSON data
        async function loadData() {
            try {
                const response = await fetch('data.json');
                fullData = await response.json();
                renderCategories();
                renderArticles(currentCategory);
            } catch (e) {
                console.error("Data not loaded yet.", e);
            }
        }

        function renderCategories() {
            const cats = [...new Set(fullData.map(item => item.category))];
            const nav = document.getElementById('category-nav');
            nav.innerHTML = cats.map(cat => `
                <button onclick="renderArticles('${cat}')" class="px-3 py-1 rounded hover:bg-blue-600 transition ${currentCategory === cat ? 'bg-blue-900 font-bold' : ''}">${cat}</button>
            `).join('');
        }

        function renderArticles(category, filterDate = null) {
            currentCategory = category;
            renderCategories();
            
            const filtered = fullData.filter(item => 
                item.category === category && (!filterDate || item.date === filterDate)
            );

            // Update Sidebar Dates for this category
            const dates = [...new Set(fullData.filter(i => i.category === category).map(i => i.date))];
            document.getElementById('date-menu').innerHTML = dates.map(d => `
                <button onclick="renderArticles('${category}', '${d}')" class="block w-full text-left p-2 hover:bg-gray-200 dark:hover:bg-gray-700 rounded">${d}</button>
            `).join('');

            // Render Articles
            const container = document.getElementById('article-list');
            container.innerHTML = filtered.map(art => `
                <div class="article-card">
                    <span class="text-xs text-blue-500 font-bold uppercase">${art.date}</span>
                    <h2 class="text-2xl font-bold mt-1 mb-4 leading-tight">${art.title}</h2>
                    ${art.image ? `<img src="${art.image}" alt="Article Image" onerror="this.style.display='none'">` : ''}
                    <div class="text-lg leading-relaxed space-y-4">
                        ${art.content.map(p => `<p>${p.value}</p>`).join('')}
                    </div>
                    <a href="${art.url}" target="_blank" class="text-blue-500 mt-4 inline-block text-sm">Read original on The Hindu →</a>
                </div>
            `).join('');
            
            window.scrollTo(0, 0);
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark');
            const icon = document.getElementById('theme-icon');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
        }

        loadData();
    </script>
</body>
</html>
