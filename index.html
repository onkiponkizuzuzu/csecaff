<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disaster Research Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Merriweather:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #f8fafc; --text: #0f172a; --border: #e2e8f0; --sidebar: #ffffff; }
        .dark { --bg: #0f172a; --text: #f1f5f9; --border: #334155; --sidebar: #1e293b; }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); transition: background-color 0.3s, color 0.3s; margin: 0; min-height: 100vh; }
        .serif-title { font-family: 'Merriweather', serif; }
        
        nav, aside { background-color: var(--sidebar); border-color: var(--border); }
        .article-card { border-bottom: 2px solid var(--border); padding-bottom: 3rem; margin-bottom: 3rem; }
        
        #sidebar { transition: all 0.3s ease; width: 280px; position: sticky; top: 65px; height: calc(100vh - 65px); }
        #sidebar.collapsed { width: 0; padding: 0; overflow: hidden; border: none; }
        
        img { border-radius: 12px; max-height: 450px; width: 100%; object-fit: cover; margin-bottom: 1.5rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .content-body p { margin-bottom: 1.25rem; line-height: 1.8; font-size: 1.125rem; }
        
        /* Hide scrollbar but keep functionality */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 px-4 py-3 flex flex-wrap gap-4 justify-between items-center border-b shadow-sm">
        <div class="flex items-center space-x-4">
            <button onclick="toggleSidebar()" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                <i class="fas fa-bars"></i>
            </button>
            <h1 class="font-bold text-xl hidden lg:block tracking-tight">Research <span class="text-blue-500">Hub</span></h1>
        </div>
        
        <div class="flex-1 max-w-md relative">
            <input type="text" id="searchInput" onkeyup="handleSearch()" placeholder="Search keywords..." 
                   class="w-full pl-10 pr-4 py-2 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            <i class="fas fa-search absolute left-3 top-3 opacity-30"></i>
        </div>

        <div class="flex space-x-2 overflow-x-auto no-scrollbar order-last md:order-none w-full md:w-auto" id="category-tabs"></div>
