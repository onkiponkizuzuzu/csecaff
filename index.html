<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TH Reader by onkiponkizuzuzu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Merriweather:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #f8fafc; --text: #0f172a; --border: #e2e8f0; --sidebar: #ffffff; }
        .dark { --bg: #0f172a; --text: #f1f5f9; --border: #334155; --sidebar: #1e293b; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); transition: all 0.3s; margin: 0; min-height: 100vh; }
        .serif-title { font-family: 'Merriweather', serif; }
        nav, aside { background-color: var(--sidebar); border-color: var(--border); }
        .article-card { border-bottom: 2px solid var(--border); padding-bottom: 2rem; margin-bottom: 3rem; width: 100%; }
        #sidebar { transition: all 0.3s ease; width: 280px; position: sticky; top: 65px; height: calc(100vh - 65px); overflow-y: auto; }
        #sidebar.collapsed { width: 0; padding: 0; overflow: hidden; border: none; }
        
        .article-title { 
            font-size: 1.75rem; 
            line-height: 2.1rem; 
            font-weight: 600; 
            color: inherit; 
            cursor: pointer;
            transition: color 0.2s;
        }
        .article-title:hover { color: #3b82f6; }
        
        .content-body { 
            font-family: 'Merriweather', serif; 
            font-size: 1.125rem; 
            line-height: 1.85; 
            font-weight: 400;
            max-width: 800px;
            margin: 0 auto;
        }
        .content-body p { margin-bottom: 1.5rem; }
        .content-body h4 { font-size: 1.25rem; font-weight: 700; margin: 2rem 0 1rem; }
        
        /* BeeLine Reader Mode */
        .beeline-mode .content-body p {
            background: linear-gradient(to right, #3b82f6 0%, #60a5fa 15%, #93c5fd 50%, #60a5fa 85%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            transition: all 0.3s ease;
        }
        .dark .beeline-mode .content-body p {
            background: linear-gradient(to right, #60a5fa 0%, #93c5fd 15%, #dbeafe 50%, #93c5fd 85%, #60a5fa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .source-link { color: #3b82f6; text-decoration: underline; font-size: 0.95rem; }
    </style>
</head>
<body>
    <nav class="sticky top-0 z-50 px-4 py-3 flex flex-wrap gap-4 justify-between items-center border-b shadow-sm">
        <div class="flex items-center space-x-4">
            <button onclick="toggleSidebar()" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"><i class="fas fa-bars"></i></button>
            <div>
                <h1 class="font-bold text-lg hidden lg:block tracking-tight">TH Reader <span class="text-blue-500 text-xs font-normal">by onkiponkizuzuzu</span></h1>
                <div id="prelims-counter" class="text-xs text-blue-600 dark:text-blue-400 mt-1 font-medium">
                    Days to Prelims 2026 (24 May): <span id="days-count" class="font-semibold">54</span>
                </div>
            </div>
        </div>
        <div class="flex-1 max-w-md relative">
            <input type="text" id="searchInput" onkeyup="handleSearch()" placeholder="Search archive..." class="w-full pl-10 pr-4 py-2 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            <i class="fas fa-search absolute left-3 top-2.5 opacity-30 text-sm"></i>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="toggleBeeLine()" id="beeline-btn"
                    class="px-4 py-1.5 text-sm font-medium rounded-xl border border-gray-300 dark:border-gray-600 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors flex items-center gap-2">
                <i class="fas fa-book-open"></i>
                <span>BeeLine Mode</span>
            </button>
            <button onclick="toggleDarkMode()" class="p-3 rounded-xl bg-gray-100 dark:bg-gray-800 transition-transform hover:scale-110"><i id="theme-icon" class="fas fa-moon text-blue-500"></i></button>
        </div>
    </nav>

    <div class="flex">
        <aside id="sidebar" class="border-r p-6 hidden md:block collapsed">
            <h3 class="text-xs font-bold uppercase opacity-40 mb-6 tracking-widest text-inherit">Historical Dates</h3>
            <div id="date-list" class="space-y-1"></div>
        </aside>

        <main class="flex-1 px-4 md:px-12 py-10 min-h-screen">
            <div id="article-feed" class="max-w-3xl mx-auto">
                <!-- Loading message will be set by JS -->
            </div>
        </main>
    </div>

    <script>
        let rawData = [], activeCategory = 'Environment', activeDate = null, isSearch = false;
        let beelineEnabled = false;

        async function init() {
            const feed = document.getElementById('article-feed');
            feed.innerHTML = `<div class="text-center py-20"><i class="fas fa-spinner fa-spin text-4xl text-blue-500"></i><p class="mt-4 opacity-70">Loading articles...</p></div>`;

            try {
                const res = await fetch('data.json');
                if (!res.ok) throw new Error('File not found');
                
                rawData = await res.json();
                
                if (!Array.isArray(rawData) || rawData.length === 0) {
                    throw new Error('No articles');
                }
                
                rawData.sort((a, b) => b.date.localeCompare(a.date));
                renderCategoryTabs([...new Set(rawData.map(a => a.category))]);
                renderView(activeCategory);
            } catch (e) {
                feed.innerHTML = `
                    <div class="text-center py-20">
                        <p class="text-xl font-medium opacity-80">No articles yet</p>
                        <p class="mt-3 text-sm opacity-60">The scraper is running twice daily (8 AM & 4 PM IST).<br>Please wait for the next run or trigger it manually from GitHub Actions.</p>
                        <button onclick="location.reload()" class="mt-6 px-6 py-2 bg-blue-600 text-white rounded-xl text-sm hover:bg-blue-700">
                            Refresh Page
                        </button>
                    </div>`;
            }
        }

        function renderCategoryTabs(cats) {
            document.getElementById('category-tabs').innerHTML = cats.map(c => `
                <button onclick="renderView('${c}')" class="px-4 py-2 rounded-full text-sm font-semibold transition-all whitespace-nowrap ${activeCategory === c && !isSearch ? 'bg-blue-600 text-white shadow-md' : 'opacity-60 hover:opacity-100'}">${c}</button>
            `).join('');
        }

        function handleSearch() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            if (q.length < 2) { isSearch = false; renderView(activeCategory); return; }
            isSearch = true;
            renderCategoryTabs([...new Set(rawData.map(a => a.category))]);
            const filtered = rawData.filter(art =>
                art.title.toLowerCase().includes(q) ||
                art.content.some(c => c.value.toLowerCase().includes(q))
            );
            renderFeed(filtered, `Search results for: "${q}"`);
        }

        function renderView(cat, date = null) {
            isSearch = false; activeCategory = cat; activeDate = date;
            document.getElementById('searchInput').value = "";
            renderCategoryTabs([...new Set(rawData.map(a => a.category))]);
            const dates = [...new Set(rawData.filter(a => a.category === cat).map(a => a.date))];
            document.getElementById('date-list').innerHTML = dates.map(d => `
                <button onclick="renderView('${cat}', '${d}')" class="w-full text-left px-4 py-2 rounded-lg text-sm transition-colors ${activeDate === d ? 'bg-blue-500 text-white shadow-sm' : 'hover:bg-gray-100 dark:hover:bg-gray-800 opacity-70'}">${d}</button>
            `).join('');
           
            const filtered = rawData.filter(a => a.category === cat && (!activeDate || a.date === activeDate));
            renderFeed(filtered);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleArticle(id) {
            const content = document.getElementById('content-' + id);
            const icon = document.getElementById('icon-' + id);
            if (content.style.display === 'none') {
                content.style.display = 'block';
                icon.classList.replace('fa-chevron-down', 'fa-chevron-up');
            } else {
                content.style.display = 'none';
                icon.classList.replace('fa-chevron-up', 'fa-chevron-down');
            }
        }

        function toggleBeeLine() {
            beelineEnabled = !beelineEnabled;
            const btn = document.getElementById('beeline-btn');
            if (beelineEnabled) {
                document.documentElement.classList.add('beeline-mode');
                btn.classList.add('bg-blue-100', 'dark:bg-blue-900', 'border-blue-500');
            } else {
                document.documentElement.classList.remove('beeline-mode');
                btn.classList.remove('bg-blue-100', 'dark:bg-blue-900', 'border-blue-500');
            }
        }

        function renderFeed(arts, title = null) {
            const feed = document.getElementById('article-feed');
            let html = title ? `<h2 class="text-xl font-bold mb-8 opacity-40">${title}</h2>` : "";
           
            if (!arts.length) {
                feed.innerHTML = html + `<p class="text-center py-20 opacity-30">No articles found.</p>`;
                return;
            }

            feed.innerHTML = html + arts.map((art, index) => {
                const id = 'art' + index;
                return `
                <article class="article-card">
                    <div onclick="toggleArticle('${id}')" class="flex items-center justify-between cursor-pointer">
                        <h2 class="serif-title article-title">${art.title}</h2>
                        <i id="icon-${id}" class="fas fa-chevron-down text-blue-500 ml-4"></i>
                    </div>
                    <div id="content-${id}" class="content-body mt-6" style="display: none;">
                        ${art.content.map(item => 
                            item.type === 'heading' ? `<h4>${item.value}</h4>` : `<p>${item.value}</p>`
                        ).join('')}
                        <div class="mt-8 pt-4 border-t">
                            <a href="${art.url}" target="_blank" class="source-link">Read full article on The Hindu →</a>
                        </div>
                    </div>
                    <div class="text-xs text-gray-500 mt-4">${art.category} | ${art.date}</div>
                </article>`;
            }).join('');
        }

        function toggleSidebar() { 
            document.getElementById('sidebar').classList.toggle('collapsed'); 
        }
        
        function toggleDarkMode() {
            const dark = document.body.classList.toggle('dark');
            document.getElementById('theme-icon').className = dark ? 'fas fa-sun text-yellow-400' : 'fas fa-moon text-blue-500';
            localStorage.setItem('theme', dark ? 'dark' : 'light');
        }
        
        if (localStorage.getItem('theme') === 'dark') toggleDarkMode();
        
        window.onload = function() {
            document.getElementById('sidebar').classList.add('collapsed');
            init();
        };
    </script>
</body>
</html>
