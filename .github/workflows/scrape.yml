name: Scheduled Hindu Scrape

on:
  schedule:
    - cron: '30 2,8 * * *'   # 2:30 AM and 8:30 AM UTC daily
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install system dependencies & Chrome
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget gnupg unzip curl
          
          # Install latest stable Google Chrome
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install selenium pandas webdriver-manager

      - name: Run Scraper
        run: python scraper.py
        env:
          # Optional: add any secrets if needed later (e.g., proxy)
          PYTHONUNBUFFERED: 1

      - name: Commit and Push Data (if changed)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet data.json; then
            echo "No changes to data.json"
          else
            git add data.json
            git commit -m "chore: Update scraped data from The Hindu $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "Nothing to commit"
            git push
          fi
