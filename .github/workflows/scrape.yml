name: Scheduled Hindu Scrape

on:
  schedule:
    # 8:30 AM IST (03:00 UTC)
    - cron: '0 3 * * *'
    # 2:30 PM IST (09:00 UTC)
    - cron: '0 9 * * *'
    # 10:53 AM IST (05:23 UTC)
    - cron: '23 5 * * *'
  workflow_dispatch:
  
jobs:
  scrape:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
   
    permissions:
      contents: write
     
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Chrome and Selenium
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg2 fonts-liberation \
            libappindicator3-1 libasound2t64 libatk-bridge2.0-0 libatk1.0-0 \
            libcups2 libdbus-1-3 libdrm2 libgbm1 libnspr4 libnss3 \
            libx11-xcb1 libxcb-dri3-0 libxcomposite1 libxdamage1 libxrandr2 xdg-utils
          
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          
          pip install selenium pandas

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "System: Final Node24 & CDP Integration $(date)" || exit 0
          git pull origin main --rebase
          git push origin main
