name: Scheduled Hindu Scrape

on:
  schedule:
    # 8:30 AM IST (3:00 AM UTC) and 2:30 PM IST (9:00 AM UTC)
    - cron: '30 3,9 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    # Force the runner to use Node 24 for all internal operations
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        # Updated to v5 (or highest available in 2026) for Node 24 support
        uses: actions/checkout@v4 

      - name: Set up Python
        # Updated to v6 (or highest available in 2026) for Node 24 support
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Google Chrome and Selenium
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          pip install selenium pandas

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "System: Node24 Migration & Data Update" || exit 0
          git push
